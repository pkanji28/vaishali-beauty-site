<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin</title><link rel="stylesheet" href="css/styles.css"></head><body><header class="site-header"><div class="site-header-inner"><a class="brand" href="index.html"><img class="brand-logo" src="assets/logo-main.png" alt="Vaishali Beauty logo"><div class="brand-copy"><h1>Vaishali&apos;s Beauty</h1><p>Beauty • Care • Confidence</p></div></a><div class="header-right"><nav class="nav"><a class="" href="index.html">Home</a><a class="" href="book.html">Booking</a><a class="" href="feedback.html">Feedback</a><a class="active" href="admin.html">Admin</a></nav><a class="btn btn-primary header-book-btn" href="book.html">Book Now</a></div></div></header><main class="section"><div class="container admin-page"><section class="card admin-hero"><span class="eyebrow">Admin Dashboard</span><h2>Manage live bookings</h2><p>View upcoming appointments, update statuses, and manage your schedule.</p></section><section class="card-soft admin-toolbar"><div class="toolbar-group"><label>Status</label><select id="adminStatusFilter"><option value="all">All</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></div><div class="toolbar-group"><label>Date</label><input id="adminDateFilter" type="date"></div><div class="toolbar-group"><label>Search</label><input id="adminSearch" type="text" placeholder="Name, phone, service"></div><div class="toolbar-actions"><button id="refreshAdmin" class="btn btn-secondary">Refresh</button></div></section><div id="adminStatusMessage" class="status-message"></div><section class="admin-summary-grid"><div class="summary-card card-soft"><h3>Today</h3><div id="todayCount" class="summary-big">0</div></div><div class="summary-card card-soft"><h3>Upcoming</h3><div id="upcomingCount" class="summary-big">0</div></div><div class="summary-card card-soft"><h3>Pending</h3><div id="pendingCount" class="summary-big">0</div></div><div class="summary-card card-soft"><h3>Total value</h3><div id="totalValue" class="summary-big">£0</div></div></section><section class="card admin-list-wrap"><div class="section-heading"><h3>All bookings</h3></div><div id="adminEmptyState" class="empty-state" hidden>No bookings found.</div><div id="adminBookingList" class="admin-booking-list"></div></section></div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/config.js"></script><script src="js/supabase.js"></script><script src="js/admin.js"></script></body></html>
